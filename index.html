<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="login-wrapper">
  <!--Front-->
  <div class="login-card">
    <div class="login-inner">
      <div class="login-header">
        <h2>Login Design</h2>
        <h3>Sign In</h3>
        <p>to get complete access</p>
        <div class="login-card-title">
          <i class="fas fa-ellipsis-h"></i>
        </div>
      </div>
      <!-- <h2 class="login-card-title">Login</h2> -->
      <div class="login-group">
        <input type="text" class="login-control" placeholder="username">
      </div>
      <div class="login-group">
        <input type="text" class="login-control" placeholder="password">
      </div>
      <div class="login-btn-group">
        <p>
          <a href="">Forgotten password?</a>
        </p>
        <div class="login-group">
          <button type="submit" class="_btn">
            <i class="fas fa-sign-in-alt"></i> Login</button>
        </div>
      </div>
      <div class="login-footer">
        <p>Don't have account?
          <span>
            <a href="">click here..</a>
          </span>
        </p>

      </div>
    </div>

    <div class="login-bottom">
      <select name="" id="login-select">
        <option value="">English</option>
      </select>
      <ul class="login-nav">
        <li><a href="#">Privacy Policy</a></li>
      </ul>
    </div>

  </div>


</div>
</div>
    
</body>
</html>
